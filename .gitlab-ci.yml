stages:
  - build
  - deploy

Dev_Build:
  stage: build
  environment: development
  variables:
    NODE_OPTIONS: --max-old-space-size=4096
  script:
    - pnpm install
    - pnpm run build
  artifacts:
    name: "fic-dev"
    paths:
      - .output/public
  tags: [build]

