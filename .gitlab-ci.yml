Dev Deploy:
  stage: deploy
  needs: [Dev_Build]
  when: manual
  environment: Production
  before_script:
    - eval $(ssh-agent -s)
    - ssh-add <(echo "$DEV_SSH_KEY")
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
    - ssh-keyscan -H $DEPLOY_SERVER >> ~/.ssh/known_hosts
  script:
    - rsync -arv --cvs-exclude --delete $TARGET_DIR_ON_LOCAL $DEV_SSH_USER@$DEPLOY_SERVER:$DEV_TARGET_DIR_ON_HOST
  tags: [deploy]

